<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DW Imports - ADM</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff}
.hidden{display:none!important}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a,#1a1a1a)}
.login-box{background:#111;padding:3rem;border-radius:20px;border:1px solid #222;width:90%;max-width:400px}
.login-box h1{text-align:center;margin-bottom:2rem;font-size:1.8rem}
.form-group{margin-bottom:1.5rem}
.form-group label{display:block;margin-bottom:0.5rem;color:#888}
.form-group input{width:100%;padding:0.8rem;border:1px solid #333;border-radius:8px;font-size:1rem;background:#1a1a1a;color:#fff}
.form-group input:focus{outline:none;border-color:#666}
.btn{width:100%;padding:1rem;background:#fff;color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;text-transform:uppercase;letter-spacing:2px}
.btn:hover{background:#ddd}
.btn-danger{background:#ff4444;color:#fff;width:auto;padding:0.5rem 1rem;font-size:0.85rem;letter-spacing:1px}
.btn-danger:hover{background:#cc0000}
header{background:rgba(10,10,10,0.98);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid #222}
.header-content{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem}
.logo{font-size:1.5rem;font-weight:bold;color:#fff}
main{margin-top:80px;padding:2rem}
.container{max-width:1200px;margin:0 auto}
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.card{background:#111;border-radius:15px;padding:2rem;border:1px solid #222}
.card h2{margin-bottom:1.5rem;color:#fff;font-size:1.3rem}
.form-group select{width:100%;padding:0.8rem;border:1px solid #333;border-radius:8px;font-size:1rem;background:#1a1a1a;color:#fff}
.form-group select:focus{outline:none;border-color:#666}
.sizes-grid{display:flex;gap:0.5rem;flex-wrap:wrap}
.size-btn{padding:0.5rem 1rem;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#888;cursor:pointer;transition:all 0.3s}
.size-btn.active{border-color:#fff;color:#fff;background:#222}
.product-list{display:flex;flex-direction:column;gap:1rem;max-height:600px;overflow-y:auto}
.product-item{display:flex;gap:1rem;padding:1rem;background:#1a1a1a;border-radius:10px;border:1px solid #222;align-items:center}
.product-item-image{width:60px;height:60px;border-radius:8px;object-fit:cover;background:#333;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.product-item-image img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.product-item-info{flex:1}
.product-item-info h3{font-size:1rem;margin-bottom:0.3rem}
.product-item-info p{color:#666;font-size:0.85rem}
.btn-delete{background:#ff4444;color:#fff;border:none;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;font-size:0.8rem}
.btn-delete:hover{background:#cc0000}
.alert{padding:1rem;border-radius:8px;margin-bottom:1rem;text-align:center}
.alert-success{background:rgba(37,211,102,0.2);border:1px solid #25D366;color:#25D366}
.alert-error{background:rgba(255,68,68,0.2);border:1px solid #ff4444;color:#ff4444}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:#111;border-radius:15px;padding:1.5rem;border:1px solid #222;text-align:center}
.stat-card h3{font-size:2rem;margin-bottom:0.5rem}
.stat-card p{color:#666;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px}
.emoji-picker{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem}
.emoji-option{font-size:1.5rem;cursor:pointer;padding:0.3rem;border-radius:5px;border:2px solid transparent}
.emoji-option:hover,.emoji-option.active{border-color:#fff}
@media(max-width:768px){.adm-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div id="loginPage" class="login-page">
<div class="login-box">
<h1>🔐 DW Imports ADM</h1>
<div class="form-group">
<label>Usuário</label>
<input type="text" id="username" placeholder="Digite o usuário">
</div>
<div class="form-group">
<label>Senha</label>
<input type="password" id="password" placeholder="Digite a senha">
</div>
<button class="btn" onclick="fazerLogin()">Entrar</button>
</div>
</div>

<div id="admPage" class="hidden">
<header>
<div class="header-content">
<div class="logo">⚽ DW Imports ADM</div>
<button class="btn btn-danger" onclick="sairLogin()">Sair</button>
</div>
</header>
<main>
<div class="container">
<div class="stats">
<div class="stat-card">
<h3 id="totalProdutos">0</h3>
<p>Total Produtos</p>
</div>
<div class="stat-card">
<h3 id="totalCategorias">0</h3>
<p>Categorias</p>
</div>
<div class="stat-card">
<h3>✅</h3>
<p>Sistema Online</p>
</div>
</div>
<div class="adm-grid">
<div class="card">
<h2>➕ Adicionar Produto</h2>
<div id="alertMsg"></div>
<div class="form-group">
<label>Nome do Produto</label>
<input type="text" id="prodNome" placeholder="Ex: Camisa Real Madrid">
</div>
<div class="form-group">
<label>Categoria</label>
<select id="prodCategoria">
<option value="europeu">Times Europeus</option>
<option value="brasileiro">Times Brasileiros</option>
<option value="retro">Camisas Retrô</option>
<option value="nba">NBA</option>
<option value="selecoes">Seleções</option>
</select>
</div>
<div class="form-group">
<label>Preço (R$)</label>
<input type="number" id="prodPreco" placeholder="Ex: 150">
</div>
<div class="form-group">
<label>Estoque</label>
<input type="number" id="prodEstoque" placeholder="Ex: 10">
</div>
<div class="form-group">
<label>Emoji</label>
<input type="text" id="prodEmoji" placeholder="Ex: ⚽" value="⚽">
<div class="emoji-picker">
<span class="emoji-option" onclick="selecionarEmoji('⚽')">⚽</span>
<span class="emoji-option" onclick="selecionarEmoji('🏀')">🏀</span>
<span class="emoji-option" onclick="selecionarEmoji('👕')">👕</span>
<span class="emoji-option" onclick="selecionarEmoji('🏆')">🏆</span>
<span class="emoji-option" onclick="selecionarEmoji('🌍')">🌍</span>
<span class="emoji-option" onclick="selecionarEmoji('🇧🇷')">🇧🇷</span>
</div>
</div>
<div class="form-group">
<label>URL da Imagem (opcional)</label>
<input type="text" id="prodImagem" placeholder="https://...">
</div>
<div class="form-group">
<label>Tamanhos</label>
<div class="sizes-grid">
<button class="size-btn" onclick="toggleSize(this,'PP')">PP</button>
<button class="size-btn" onclick="toggleSize(this,'P')">P</button>
<button class="size-btn" onclick="toggleSize(this,'M')">M</button>
<button class="size-btn" onclick="toggleSize(this,'G')">G</button>
<button class="size-btn" onclick="toggleSize(this,'GG')">GG</button>
<button class="size-btn" onclick="toggleSize(this,'XGG')">XGG</button>
</div>
</div>
<button class="btn" onclick="adicionarProduto()">➕ Adicionar Produto</button>
</div>
<div class="card">
<h2>📦 Produtos Cadastrados</h2>
<div class="product-list" id="productList">
<p style="color:#666;text-align:center;padding:2rem">Carregando produtos...</p>
</div>
</div>
</div>
</div>
</main>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,collection,addDoc,deleteDoc,doc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC9yWG6n_NL7voXZMnwuyieW6urrjJFWvg",
authDomain:"dw-imports.firebaseapp.com",
projectId:"dw-imports",
storageBucket:"dw-imports.firebasestorage.app",
messagingSenderId:"802077401567",
appId:"1:802077401567:web:d604fd84ca4abf032aa46a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
let produtos=[];

onSnapshot(collection(db,'produtos'),(snapshot)=>{
produtos=[];
snapshot.forEach(doc=>{
produtos.push({id:doc.id,...doc.data()});
});
renderProdutos();
atualizarStats();
});

function renderProdutos(){
const list=document.getElementById('productList');
if(produtos.length===0){
list.innerHTML='<p style="color:#666;text-align:center;padding:2rem">Nenhum produto cadastrado!</p>';
return;
}
list.innerHTML=produtos.map(p=>`
<div class="product-item">
<div class="product-item-image">
${p.imagem?`<img src="${p.imagem}" alt="${p.nome}">`:`<span>${p.emoji}</span>`}
</div>
<div class="product-item-info">
<h3>${p.nome}</h3>
<p>R$ ${p.preco.toFixed(2).replace('.',',')} | ${p.categoria} | Estoque: ${p.estoque}</p>
<p>Tamanhos: ${p.tamanhos.join(', ')}</p>
</div>
<button class="btn-delete" onclick="window.deletarProduto('${p.id}')">🗑 Deletar</button>
</div>
`).join('');
}

function atualizarStats(){
document.getElementById('totalProdutos').textContent=produtos.length;
const cats=new Set(produtos.map(p=>p.categoria));
document.getElementById('totalCategorias').textContent=cats.size;
}

window.fazerLogin=function(){
const user=document.getElementById('username').value;
const pass=document.getElementById('password').value;
if(user==='admin1512'&&pass==='151298Dudu'){
document.getElementById('loginPage').classList.add('hidden');
document.getElementById('admPage').classList.remove('hidden');
}else{
alert('❌ Usuário ou senha incorretos!');
}
}

window.sairLogin=function(){
document.getElementById('loginPage').classList.remove('hidden');
document.getElementById('admPage').classList.add('hidden');
document.getElementById('username').value='';
document.getElementById('password').value='';
}

window.selecionarEmoji=function(emoji){
document.getElementById('prodEmoji').value=emoji;
document.querySelectorAll('.emoji-option').forEach(e=>e.classList.remove('active'));
event.target.classList.add('active');
}

window.toggleSize=function(btn,size){
btn.classList.toggle('active');
}

window.adicionarProduto=async function(){
const nome=document.getElementById('prodNome').value.trim();
const categoria=document.getElementById('prodCategoria').value;
const preco=parseFloat(document.getElementById('prodPreco').value);
const estoque=parseInt(document.getElementById('prodEstoque').value);
const emoji=document.getElementById('prodEmoji').value||'⚽';
const imagem=document.getElementById('prodImagem').value.trim();
const tamanhosBtns=document.querySelectorAll('.size-btn.active');
const tamanhos=Array.from(tamanhosBtns).map(b=>b.textContent);

if(!nome||!preco|
!estoque||tamanhos.length===0){
showAlert('❌ Preencha todos os campos e selecione pelo menos um tamanho!','error');
return;
}
try{
await addDoc(collection(db,'produtos'),{
nome,categoria,preco,estoque,emoji,imagem,tamanhos,
criadoEm:new Date()
});
showAlert('✅ Produto adicionado com sucesso!','success');
document.getElementById('prodNome').value='';
document.getElementById('prodPreco').value='';
document.getElementById('prodEstoque').value='';
document.getElementById('prodEmoji').value='⚽';
document.getElementById('prodImagem').value='';
document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
}catch(e){
showAlert('❌ Erro ao adicionar produto!','error');
}
}

window.deletarProduto=async function(id){
if(confirm('Tem certeza que deseja deletar este produto?')){
try{
await deleteDoc(doc(db,'produtos',id));
showAlert('✅ Produto deletado!','success');
}catch(e){
showAlert('❌ Erro ao deletar!','error');
}
}
}

function showAlert(msg,type){
const alert=document.getElementById('alertMsg');
alert.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;
setTimeout(()=>alert.innerHTML='',3000);
}
</script>
</body>
</html>
